name: Weekly DB Backup

# 每周日 06:00 UTC = EST 周六晚 1:00 / EDT 周六晚 2:00 自动跑
# 也支持 GitHub Actions 页面手动触发（workflow_dispatch）
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify DATABASE_URL secret exists
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret 未配置"
            echo "去仓库 Settings → Secrets and variables → Actions → New secret"
            echo "key = DATABASE_URL，value = Railway PG 的完整连接字符串（postgresql://...）"
            exit 1
          fi
          echo "✓ DATABASE_URL secret 已配置"

      - name: Install postgresql-client 16
        # GitHub-hosted runner 自带的 pg_dump 是 14；Railway PG 是 16，版本不匹配会 dump 失败。
        # 装官方 16 客户端以匹配
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-16
          pg_dump --version

      - name: Run pg_dump
        # pipefail 关键 —— 不加的话 pg_dump 失败但 gzip 成功，会得到一个 20 字节的空 .gz
        # 之前就这么"骗"了我们一次，artifact 上传了个空文件没人发现
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          mkdir -p backups
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          RAW="backups/bbsh-dump-${TIMESTAMP}.sql"
          OUTFILE="backups/bbsh-dump-${TIMESTAMP}.sql.gz"

          echo "▶ dumping to $RAW (will gzip after)..."
          # 两步走：先 dump 到文件（pg_dump 失败立刻退出），再 gzip
          # 不再用 `pg_dump | gzip` 管道，避免错误被 gzip 吞掉
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl --clean --if-exists \
            --file="$RAW"

          # Sanity check：dump 文件应该 > 1KB（即使空库也至少有 schema CREATE 语句）
          RAW_BYTES=$(stat -c%s "$RAW" 2>/dev/null || stat -f%z "$RAW")
          echo "raw dump size: $RAW_BYTES bytes"
          if [ "$RAW_BYTES" -lt 1024 ]; then
            echo "::error::dump 太小了（$RAW_BYTES 字节），疑似 pg_dump 静默失败"
            head -20 "$RAW" || true
            exit 1
          fi

          gzip -9 "$RAW"
          SIZE=$(du -h "$OUTFILE" | cut -f1)
          echo "✓ 备份完成: $OUTFILE ($SIZE)"
          ls -lh backups/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbsh-db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 90
          if-no-files-found: error
